{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card">

        <div class="card-header bg-primary text-white">
            Split PDF
        </div>

        <div class="card-body">

            <p>
                PDF :
                <strong>{{ document.file.name }}</strong>
            </p>

            {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
            {% endif %}

            <form method="post">

                {% csrf_token %}

                <label class="form-label">
                    Pages
                </label>

                <input
                    type="text"
                    name="pages"
                    class="form-control"
                    placeholder="Example: 1-3,5,7-10"
                    required
                >

                <small class="text-muted">
                    Examples:
                    1-5
                    &nbsp; | &nbsp;
                    1,3,6
                    &nbsp; | &nbsp;
                    1-3,7,9-10
                </small>

                <br><br>

                <button class="btn btn-warning">

                    <i class="fas fa-cut"></i>

                    Split PDF

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
