{% load i18n %} {% extends "base.html" %} {% block title %}Password Changed –
Cyber Café{% endblock %} {% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-lg border-0 rounded-4 text-center">
        <div class="card-body p-4 p-md-5">
          <div class="mb-4">
            <i class="fas fa-check-circle fa-5x text-success mb-3"></i>
            <h2 class="fw-bold">Password Changed!</h2>
            <p class="text-muted">
              Your password has been updated successfully.
            </p>
          </div>

          <div class="d-grid gap-2">
            <a
              href="{% url 'profile' %}"
              class="btn btn-primary btn-lg rounded-pill fw-semibold"
            >
              <i class="fas fa-arrow-left me-2"></i> Return to Profile
            </a>
            <a
              href="{% url 'dashboard' %}"
              class="btn btn-outline-secondary rounded-pill"
            >
              <i class="fas fa-home me-2"></i> Go to Dashboard
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  .card {
    background: #ffffff;
    transition: transform 0.2s ease;
  }
  .card:hover {
    transform: translateY(-2px);
  }

  .btn-outline-secondary {
    border-color: #e2e8f0;
    color: #0b1b33;
  }
  .btn-outline-secondary:hover {
    background: #f8fafc;
    border-color: #cbd5e1;
  }

  @media (max-width: 576px) {
    .card-body {
      padding: 1.5rem !important;
    }
  }
</style>
{% endblock %}
